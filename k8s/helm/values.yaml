replicaCount: 2

image:
  repository: mackieuni/aresvision
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  apiPort: 80
  metricsPort: 9090

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

monitoring:
  enabled: true
  prometheus:
    scrape: true

deployment:
  environment: production
  logLevel: INFO
  classification: unclassified

health:
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
